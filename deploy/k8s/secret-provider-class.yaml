# ─────────────────────────────────────────────────────────────────────────────
# SecretProviderClass — AWS Secrets Manager via Secrets Store CSI Driver
# (Misión 2 Q2 — implementación aspiracional para producción real)
#
# AWS Academy — por qué NO se puede usar en Academy:
#   El CSI Driver necesita que el ServiceAccount tenga un rol IRSA con permisos
#   sobre secretsmanager:GetSecretValue. Como IRSA no está disponible en
#   Academy, este manifiesto NO se aplica en el entorno del bootcamp.
#
# En Academy, la alternativa práctica es:
#   - Los pods usan el instance profile del nodo (LabRole) que tiene acceso a
#     Secrets Manager por sus permisos amplios.
#   - Las variables de entorno sensibles se pasan via ConfigMap (solo para
#     valores no críticos; nunca contraseñas reales).
#   - Para la demo: SES_VERIFIED_SENDER se pasa en el ConfigMap porque es un
#     email público, no una credencial sensible.
#
# PRODUCCIÓN REAL — cómo habilitarlo:
#   1. Instalar el add-on: aws eks create-addon --addon-name aws-secrets-manager-and-config-provider
#   2. Crear el secreto: aws secretsmanager create-secret --name "como-vapp/dev/ses-credentials" ...
#   3. Anotar el ServiceAccount con el rol IRSA que tenga secretsmanager:GetSecretValue
#   4. Aplicar este manifiesto: kubectl apply -f secret-provider-class.yaml
#   5. Referenciar el volumen en el Deployment (ejemplo al final del archivo)
# ─────────────────────────────────────────────────────────────────────────────

