# ─────────────────────────────────────────────────────────────────────────────
# admin-service — Deployment + Service
# 2 replicas (Misión 1 criterio de éxito)
# Resource limits from Misión 2 Q6 table (Kotlin: 100m/250m CPU, 192Mi/312Mi RAM)
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: como-vapp-dev
  labels:
    app: admin-service
    app.kubernetes.io/part-of: como-vapp
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: admin-service
        app.kubernetes.io/part-of: como-vapp
    spec:
      serviceAccountName: admin-sa

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: admin-service
          image: 886240425170.dkr.ecr.us-east-1.amazonaws.com/como-vapp-dev-admin-service:0.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          envFrom:
            - configMapRef:
                name: admin-config

          volumeMounts:
            - name: tmp
              mountPath: /tmp

          # Resource limits — Misión 2 Q6 (Kotlin/admin-service)
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "250m"
              memory: "312Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3

      volumes:
        - name: tmp
          emptyDir: {}

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: admin-service
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: como-vapp-dev
  labels:
    app: admin-service
    app.kubernetes.io/part-of: como-vapp
spec:
  selector:
    app: admin-service
  ports:
    - name: http
      port: 80
      targetPort: 8081
      protocol: TCP
  type: ClusterIP
