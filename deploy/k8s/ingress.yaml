# ─────────────────────────────────────────────────────────────────────────────
# Ingress — AWS ALB Ingress Controller
#
# ARQUITECTURA DE EXPOSICIÓN (Misión 2 Q3):
#   Público (ALB)  : orders-service — usuarios externos crean y consultan pedidos
#   Interno (solo ClusterIP o port-forward) : admin-service, notifications-service
#     → admin-service nunca debería estar en un ALB público (API administrativa)
#     → notifications-service es interno; se expone solo para demo via port-forward
#
# El frontend NO está en K8s — se sirve desde S3 static website (Misión 1 Q7).
#
# Para la demo (admin + notifications):
#   kubectl -n como-vapp-dev port-forward deploy/admin-service 8081:8081 &
#   kubectl -n como-vapp-dev port-forward deploy/notifications-service 8082:8082 &
#
# Prerequisites:
#   helm install aws-load-balancer-controller eks/aws-load-balancer-controller \
#     -n kube-system --set clusterName=como-vapp-eks
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: como-vapp-ingress
  namespace: como-vapp-dev
  labels:
    app.kubernetes.io/part-of: como-vapp
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    # Producción: habilitar HTTPS
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:REGION:ACCOUNT:certificate/ID
    # alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/success-codes: "200"
spec:
  rules:
    - http:
        paths:
          # Único servicio expuesto al público: usuarios crean y consultan pedidos
          - path: /orders
            pathType: Prefix
            backend:
              service:
                name: orders-service
                port:
                  number: 80
